<style>
    .select2-container {
        z-index: 999999 !important;
    }
    .select2-container .select2-selection--single {
        height: 30px;
    }
</style>
<div id="bx-agents-agents-alert-cont" style="overflow:visible;">
<select id="bx-agents-agents-alert" name="alert" class="bx-def-font-inputs bx-form-input-select">
    <bx_repeat:alerts>
        <option value="__value__" <bx_if:sel>__sel__</bx_if:sel> data-desc="__desc__">__name__</option>
    </bx_repeat:alerts>
</select>
</div>
<script>
    function formatItem(state) {
        if (!state.id) 
            return state.text;
        const desc = $(state.element).data('desc');
        return $(`
            <div>
                <div style="font-weight:600">${state.text}</div>
                <div style="font-size:12px;color:#888">${desc || ''}</div>
            </div>
        `);
    }
    $('#bx-agents-agents-alert').select2({
        templateResult: formatItem,
        templateSelection: d => d.text,
    });
</script>
