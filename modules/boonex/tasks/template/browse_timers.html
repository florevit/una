__js_code__
<div class="bx-tasks-timers-sections">
    <div class="bx-tasks-ts-cnt space-y-4">
        <bx_repeat:sections>
            <div class="bx-tasks-section">
                <div class="bx-tasks-section-ttl mb-2 text-xl">__section_title__</div>
                <div class="bx-tasks-section-cnt flex flex-wrap -m-2">
                    <bx_repeat:timers>
                        <div class="bx-tasks-timer-card-wrp w-1/4">
                            <div class="bx-tasks-timer-card bx-def-box bx-def-box-round-corners m-2">
                                <div class="bx-tasks-timer-card-cnt p-4">
                                    <div class="bx-tasks-tc-task flex">
                                        <bx_if:show_context>
                                            <a class="bx-tasks-tc-context truncate" href="__url__">__title__</a><span class="pr-1">:</span>
                                        </bx_if:show_context>
                                        <a class="bx-tasks-tc-content truncate" href="__content_url__">__content_title__</a>
                                    </div>
                                    <div class="bx-tasks-tc-value mt-4">__timer__</div>
                                </div>
                            </div>
                            <script>__js_code_timer__</script>
                        </div>
                    </bx_repeat:timers>
                </div>
            </div>
        </bx_repeat:sections>
    </div>
</div>
